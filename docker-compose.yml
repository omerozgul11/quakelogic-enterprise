version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ql_enterprise_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage/app:/var/www/storage/app
      - ./storage/logs:/var/www/storage/logs
    environment:
      - APP_ENV=local
      - PHP_OPCACHE_ENABLE=0
    networks:
      - ql_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: ql_enterprise_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ql_network
    depends_on:
      - app

  mariadb:
    image: mariadb:11.4
    container_name: ql_enterprise_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${DB_DATABASE:-quakelogic_enterprise}
      MARIADB_USER: ${DB_USERNAME:-quakelogic}
      MARIADB_PASSWORD: ${DB_PASSWORD:-quakelogic_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - ql_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: ql_enterprise_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - ql_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ql_enterprise_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - ql_network

  minio:
    image: minio/minio:latest
    container_name: ql_enterprise_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-quakelogic-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-quakelogic-minio-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ql_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: ql_enterprise_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ql_network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-quakelogic-minio} ${AWS_SECRET_ACCESS_KEY:-quakelogic-minio-secret};
        mc mb --ignore-existing local/${AWS_BUCKET:-quakelogic-enterprise};
        mc anonymous set download local/${AWS_BUCKET:-quakelogic-enterprise}/public;
        exit 0;
      "
    restart: on-failure

  mailpit:
    image: axllent/mailpit:latest
    container_name: ql_enterprise_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ql_network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ql_enterprise_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=default,imports,ai,notifications,emails
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    networks:
      - ql_network
    depends_on:
      - app
      - redis
      - mariadb

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ql_enterprise_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    networks:
      - ql_network
    depends_on:
      - app
      - redis
      - mariadb

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local

networks:
  ql_network:
    driver: bridge
